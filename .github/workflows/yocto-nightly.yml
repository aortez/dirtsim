name: Yocto Nightly

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yocto-build:
    runs-on: self-hosted
    env:
      DL_DIR: /home/data/linux1/yocto-cache/downloads
      SSTATE_DIR: /home/data/linux1/yocto-cache/sstate-cache
      CCACHE_DIR: /home/data/linux1/yocto-cache/.ccache/dirtsim-yocto
      DIRTSIM_CACHE_ROOT: /home/data/linux1/yocto-cache
      KAS_REPOS_DIR: /home/data/linux1/yocto-cache/kas-repos

    steps:
    - name: Check disk space
      run: |
        avail_gb=$(df --output=avail /home/data/linux1 | tail -1 | awk '{printf "%d", $1/1024/1024}')
        echo "Available disk space: ${avail_gb}GB"
        if [ "$avail_gb" -lt 10 ]; then
          echo "::error::Insufficient disk space: ${avail_gb}GB available, need at least 10GB"
          exit 1
        fi

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: false
        submodules: recursive
        fetch-depth: 0

    - name: Prepare Yocto cache
      run: |
        CACHE_ROOT="${DIRTSIM_CACHE_ROOT}"
        mkdir -p \
          "${CACHE_ROOT}/downloads" \
          "${CACHE_ROOT}/sstate-cache" \
          "${CACHE_ROOT}/.ccache/dirtsim-yocto" \
          "${CACHE_ROOT}/kas-repos" \
          "${CACHE_ROOT}/kas-build-x86" \
          "${CACHE_ROOT}/kas-build-pi"
        find "${CACHE_ROOT}/sstate-cache" -type f -mtime +7 -delete || true
        find "${CACHE_ROOT}/downloads" -type f -mtime +7 -delete || true
        find "${CACHE_ROOT}/.ccache/dirtsim-yocto" -type f -mtime +7 -delete || true

    - name: Install Yocto npm deps
      working-directory: yocto
      run: npm install --no-package-lock

    - name: Yocto build (docker)
      working-directory: yocto
      env:
        KAS_BUILD_DIR: /home/data/linux1/yocto-cache/kas-build-pi
      run: npm run docker-build

    - name: Build + publish x86 runtime container image
      working-directory: yocto
      env:
        KAS_BUILD_DIR: /home/data/linux1/yocto-cache/kas-build-x86
        DIRTSIM_RUNTIME_REGISTRY: oldman-desktop.local:5000
      run: npm run runtime-image -- --build --publish

    - name: Cleanup Docker artifacts
      if: ${{ always() }}
      run: |
        echo "### Disk Usage (before Docker cleanup)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        df -h /home/data/linux1 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "### Docker Usage (before)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        docker system df >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "Removing dangling images..."
        docker image prune -f

        echo "Removing old dirtsim-builder images..."
        for id in $(docker images dirtsim-builder --format "{{.ID}}"); do
          created=$(docker inspect --format='{{.Created}}' "$id")
          if [ $(date -d "$created" +%s) -lt $(date -d '2 days ago' +%s) ]; then
            echo "Removing old image $id (created $created)"
            docker rmi -f "$id" || true
          fi
        done

        echo "Pruning Docker build cache..."
        docker builder prune -f --keep-storage 5gb

        if docker ps -q -f name=dirtsim-registry | grep -q .; then
          echo "Running registry garbage collection..."
          docker exec dirtsim-registry bin/registry garbage-collect \
            /etc/docker/registry/config.yml --delete-untagged 2>&1 || true
        else
          echo "Registry container not running, skipping."
        fi

        echo "### Disk Usage (after Docker cleanup)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        df -h /home/data/linux1 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "### Docker Usage (after)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        docker system df >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Cleanup Yocto cache
      if: ${{ always() }}
      env:
        YOCTO_CACHE_ROOT: /home/data/linux1/yocto-cache
        YOCTO_CACHE_RETENTION_DAYS: 7
        YOCTO_LOG_RETENTION_DAYS: 3
        YOCTO_BUILD_RETENTION_DAYS: 7
      run: |
        echo "### Disk Usage (before Yocto cleanup)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        df -h /home/data/linux1 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "### Yocto Cache Usage (before)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        du -sh "${YOCTO_CACHE_ROOT}"/* 2>/dev/null | sort -h >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "Pruning Yocto cache files older than ${YOCTO_CACHE_RETENTION_DAYS} days..."
        if [ -d "${YOCTO_CACHE_ROOT}/sstate-cache" ]; then
          find "${YOCTO_CACHE_ROOT}/sstate-cache" -type f -mtime +"${YOCTO_CACHE_RETENTION_DAYS}" -delete || true
        fi
        if [ -d "${YOCTO_CACHE_ROOT}/downloads" ]; then
          find "${YOCTO_CACHE_ROOT}/downloads" -type f -mtime +"${YOCTO_CACHE_RETENTION_DAYS}" -delete || true
        fi
        if [ -d "${YOCTO_CACHE_ROOT}/.ccache/dirtsim-yocto" ]; then
          find "${YOCTO_CACHE_ROOT}/.ccache/dirtsim-yocto" -type f -mtime +"${YOCTO_CACHE_RETENTION_DAYS}" -delete || true
        fi

        echo "Pruning Yocto build logs older than ${YOCTO_LOG_RETENTION_DAYS} days..."
        for dir in "${YOCTO_CACHE_ROOT}"/kas-build-*/tmp/log; do
          if [ -d "${dir}" ]; then
            find "${dir}" -type f -mtime +"${YOCTO_LOG_RETENTION_DAYS}" -delete || true
          fi
        done

        echo "Removing Yocto build dirs older than ${YOCTO_BUILD_RETENTION_DAYS} days..."
        for dir in "${YOCTO_CACHE_ROOT}"/kas-build-*; do
          if [ -d "${dir}" ] && [ "$(find "${dir}" -maxdepth 0 -mtime +"${YOCTO_BUILD_RETENTION_DAYS}" -print)" ]; then
            echo "Removing ${dir}"
            rm -rf "${dir}"
          fi
        done

        echo "### Disk Usage (after Yocto cleanup)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        df -h /home/data/linux1 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "### Yocto Cache Usage (after)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        du -sh "${YOCTO_CACHE_ROOT}"/* 2>/dev/null | sort -h >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

name: PR Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
    - name: Fix permissions on build artifacts
      run: |
        # Fix any permission issues from previous builds.
        cd $GITHUB_WORKSPACE || true
        chmod -R u+w . 2>/dev/null || true

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: true
        submodules: recursive
        fetch-depth: 0

    - name: Merge target branch
      if: github.event_name == 'pull_request'
      run: .github/scripts/merge-target-branch.sh ${{ github.event.pull_request.base.ref }}

    - name: Check code formatting
      working-directory: apps
      run: |
        # Check if any files would change after formatting.
        make format
        if ! git diff --quiet; then
          echo "Code formatting issues detected. Run 'make format' locally."
          git diff
          exit 1
        fi

    - name: Build debug version
      working-directory: apps
      run: make -j$(nproc) debug

    - name: Run unit tests
      working-directory: apps
      run: ./build-debug/bin/dirtsim-tests

  deploy-and-smoke-test:
    runs-on: self-hosted
    needs: build-and-test

    steps:
    - name: Fix permissions on build artifacts
      run: |
        # Fix any permission issues from previous builds.
        cd $GITHUB_WORKSPACE || true
        chmod -R u+w . 2>/dev/null || true

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: true
        submodules: recursive
        fetch-depth: 0

    - name: Merge target branch
      if: github.event_name == 'pull_request'
      run: .github/scripts/merge-target-branch.sh ${{ github.event.pull_request.base.ref }}

    - name: Install yocto dependencies
      working-directory: yocto
      run: npm install

    - name: Configure SSH for dirtsim.local
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DIRTSIM_SSH_KEY }}" > ~/.ssh/dirtsim_key
        chmod 600 ~/.ssh/dirtsim_key
        cat >> ~/.ssh/config <<EOF
        Host dirtsim.local
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          IdentityFile ~/.ssh/dirtsim_key
        EOF

        # Create .flash-config.json for deploy script.
        cat > yocto/.flash-config.json <<EOF
        {
          "ssh_key_path": "$HOME/.ssh/dirtsim_key"
        }
        EOF

    - name: Deploy and smoke test on dirtsim.local
      working-directory: yocto
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        npm run smoke-test

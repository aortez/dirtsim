name: PR Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: true
        submodules: recursive
        fetch-depth: 0

    - name: Merge target branch
      if: github.event_name == 'pull_request'
      run: .github/scripts/merge-target-branch.sh ${{ github.event.pull_request.base.ref }}

    - name: Check code formatting
      working-directory: apps
      run: |
        # Check if any files would change after formatting.
        make format
        if ! git diff --quiet; then
          echo "Code formatting issues detected. Run 'make format' locally."
          git diff
          exit 1
        fi

    - name: Build debug version
      working-directory: apps
      run: make -j$(nproc) debug

    - name: Run unit tests
      working-directory: apps
      run: ./build-debug/bin/dirtsim-tests

  deploy-and-smoke-test:
    runs-on: self-hosted
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: true
        submodules: recursive
        fetch-depth: 0

    - name: Merge target branch
      if: github.event_name == 'pull_request'
      run: .github/scripts/merge-target-branch.sh ${{ github.event.pull_request.base.ref }}

    - name: Install yocto dependencies
      working-directory: yocto
      run: npm install

    - name: Configure SSH for dirtsim.local
      run: |
        echo "HOME is: $HOME"
        echo "User is: $(whoami)"
        mkdir -p ~/.ssh
        cat >> ~/.ssh/config <<EOF
        Host dirtsim.local
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
        EOF
        echo "SSH config created:"
        cat ~/.ssh/config

    - name: Test SSH connectivity
      run: |
        echo "Testing ping..."
        ping -c 1 -W 2 dirtsim.local || echo "Ping failed"
        echo "Testing SSH..."
        ssh -o BatchMode=yes dirtsim@dirtsim.local 'echo "SSH works"' || echo "SSH failed"

    - name: Deploy and smoke test on dirtsim.local
      working-directory: yocto
      run: npm run smoke-test
